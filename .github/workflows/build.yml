name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  tests:
    name: Test Suite
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Run test suite
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e . pytest
          python3 -m pytest -q

  linux-x64:
    name: Linux x64 (AppImage)
    runs-on: ubuntu-22.04
    needs:
      - tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils libegl1 libfuse2 libgl1 libopengl0 libxkbcommon-x11-0 libxcb-cursor0 patchelf

      - name: Download linuxdeploy and appimagetool
        run: |
          mkdir -p tools
          curl -L -o tools/linuxdeploy "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          curl -L -o tools/appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x tools/linuxdeploy tools/appimagetool

      - name: Build frozen app
        run: |
          RUN_TESTS=0 PYTHON_BIN=python3.11 bash scripts/build_linux.sh

      - name: Smoke test frozen app
        run: |
          dist/SnakeSh/SnakeSh --help >/tmp/snakesh-linux-help.txt

      - name: Package AppImage
        run: |
          PYTHON_BIN=python3.11 LINUXDEPLOY_BIN="$PWD/tools/linuxdeploy" APPIMAGETOOL_BIN="$PWD/tools/appimagetool" bash scripts/package_linux_appimage.sh

      - name: Smoke test AppImage
        run: |
          APPIMAGE="$(find dist -maxdepth 1 -type f -name 'SnakeSh-*-x86_64.AppImage' | head -n 1)"
          test -n "${APPIMAGE}"
          "${APPIMAGE}" --help >/tmp/snakesh-appimage-help.txt

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snakesh-linux-x64
          path: dist/*.AppImage
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }} (dmg/zip)
    runs-on: ${{ matrix.runner }}
    needs:
      - tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x64
          - runner: macos-14
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Select macOS artifact mode
        shell: bash
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          if [[ -n "${MACOS_CERT_BASE64}" && -n "${MACOS_CERT_PASSWORD}" && -n "${MACOS_SIGN_IDENTITY}" ]]; then
            echo "MACOS_ARTIFACT_SUFFIX=" >> "$GITHUB_ENV"
            echo "MACOS_SIGNING_ENABLED=1" >> "$GITHUB_ENV"
            if [[ -n "${MACOS_NOTARY_APPLE_ID}" && -n "${MACOS_NOTARY_TEAM_ID}" && -n "${MACOS_NOTARY_PASSWORD}" ]]; then
              echo "MACOS_NOTARY_ENABLED=1" >> "$GITHUB_ENV"
            else
              echo "MACOS_NOTARY_ENABLED=0" >> "$GITHUB_ENV"
            fi
          else
            echo "MACOS_ARTIFACT_SUFFIX=-unsigned" >> "$GITHUB_ENV"
            echo "MACOS_SIGNING_ENABLED=0" >> "$GITHUB_ENV"
            echo "MACOS_NOTARY_ENABLED=0" >> "$GITHUB_ENV"
          fi

      - name: Build frozen app
        shell: bash
        run: |
          RUN_TESTS=0 PYTHON_BIN=python3 TARGET_ARCH=${{ matrix.arch }} bash scripts/build_macos.sh

      - name: Smoke test app bundle
        shell: bash
        run: |
          dist/SnakeSh.app/Contents/MacOS/SnakeSh --help >/tmp/snakesh-macos-help.txt

      - name: Import macOS signing certificate
        if: env.MACOS_SIGNING_ENABLED == '1'
        shell: bash
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          PYTHON_BIN=python3 bash scripts/import_macos_signing_cert.sh

      - name: Sign macOS app bundle
        if: env.MACOS_SIGNING_ENABLED == '1'
        shell: bash
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          APP_PATH="dist/SnakeSh.app" SIGN_TARGET=app bash scripts/sign_macos.sh

      - name: Notarize macOS app bundle
        if: env.MACOS_SIGNING_ENABLED == '1' && env.MACOS_NOTARY_ENABLED == '1'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          TARGET_PATH="dist/SnakeSh.app" bash scripts/notarize_macos.sh

      - name: Package macOS artifacts
        shell: bash
        run: |
          TARGET_ARCH=${{ matrix.arch }} ARTIFACT_SUFFIX="${MACOS_ARTIFACT_SUFFIX}" PACKAGE_ZIP=1 PACKAGE_DMG=1 bash scripts/package_macos.sh

      - name: Sign macOS disk image
        if: env.MACOS_SIGNING_ENABLED == '1'
        shell: bash
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          TARGET_PATH="dist/SnakeSh-macos-${{ matrix.arch }}${MACOS_ARTIFACT_SUFFIX}.dmg" SIGN_TARGET=dmg bash scripts/sign_macos.sh

      - name: Notarize macOS disk image
        if: env.MACOS_SIGNING_ENABLED == '1' && env.MACOS_NOTARY_ENABLED == '1'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          TARGET_PATH="dist/SnakeSh-macos-${{ matrix.arch }}${MACOS_ARTIFACT_SUFFIX}.dmg" bash scripts/notarize_macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snakesh-macos-${{ matrix.arch }}
          path: |
            dist/SnakeSh-macos-${{ matrix.arch }}*.zip
            dist/SnakeSh-macos-${{ matrix.arch }}*.dmg
          if-no-files-found: error

  windows-x64:
    name: Windows x64 (Setup EXE)
    runs-on: windows-latest
    needs:
      - tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build frozen app and installer
        shell: powershell
        run: .\scripts\build_windows.ps1 -PythonExe python -SkipTests

      - name: Smoke test frozen app
        shell: powershell
        run: |
          $exePath = (Resolve-Path ".\dist\SnakeSh\SnakeSh.exe").Path
          $process = Start-Process -FilePath $exePath -ArgumentList "--help" -PassThru -Wait
          if ($process.ExitCode -ne 0) {
            throw "SnakeSh.exe smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snakesh-windows-x64
          path: dist/*-Setup.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - linux-x64
      - macos
      - windows-x64
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: snakesh-*
          path: release-assets

      - name: Generate release checksums
        run: |
          : > release-assets/SHA256SUMS.txt
          while IFS= read -r file; do
            sha256sum "$file" >> release-assets/SHA256SUMS.txt
          done < <(find release-assets -type f \( -name '*.AppImage' -o -name '*-Setup.exe' -o -name '*.zip' -o -name '*.dmg' \) | sort)
          test -s release-assets/SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.AppImage
            release-assets/**/*-Setup.exe
            release-assets/**/*.zip
            release-assets/**/*.dmg
            release-assets/SHA256SUMS.txt
